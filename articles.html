<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文字 — 我的小站</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* === 写新文章按钮 === */
    .write-new {
      text-align: right;
      margin-bottom: 16px;
    }
    .write-new a {
      color: #999;
      font-size: 0.85rem;
      text-decoration: none;
      cursor: pointer;
      border-bottom: 1px dashed #ccc;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .write-new a:hover { color: #333; border-color: #333; }

    /* === 密码弹窗 === */
    .pwd-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    .pwd-overlay.show { display: flex; }
    .pwd-dialog {
      background: #fff;
      border-radius: 8px;
      padding: 36px 32px;
      width: 340px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .pwd-dialog h3 { font-weight: 400; font-size: 1.1rem; margin-bottom: 6px; }
    .pwd-dialog .sub { color: #999; font-size: 0.8rem; margin-bottom: 16px; }
    .pwd-dialog input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
    }
    .pwd-dialog input:focus { border-color: #888; }
    .pwd-dialog .err { color: #c0392b; font-size: 0.75rem; min-height: 18px; margin-top: 8px; }
    .pwd-dialog .btns { display: flex; gap: 8px; margin-top: 12px; }
    .pwd-dialog button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .pwd-dialog .btn-confirm { background: #333; color: #fff; }
    .pwd-dialog .btn-confirm:hover { background: #555; }
    .pwd-dialog .btn-cancel { background: #fff; color: #666; border: 1px solid #ddd; }
    .pwd-dialog .btn-cancel:hover { background: #f5f5f5; }

    /* === 编辑器 === */
    .editor-wrap {
      display: none;
    }
    .editor-wrap.show {
      display: block;
    }

    .editor-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #999;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .editor-back:hover { color: #333; }

    .editor-field { margin-bottom: 16px; }
    .editor-field label { display: block; color: #999; font-size: 0.8rem; margin-bottom: 4px; }
    .editor-field input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      font-family: inherit;
    }
    .editor-field input[type="text"]:focus { border-color: #888; }

    .editor-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #ddd;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
    }
    .editor-toolbar button {
      padding: 6px 12px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      font-size: 0.85rem;
      color: #666;
      transition: all 0.15s;
    }
    .editor-toolbar button:hover { background: #f0f0f0; color: #333; }
    .editor-toolbar button:active { background: #e0e0e0; }
    .editor-toolbar .sep { width: 1px; background: #e0e0e0; margin: 2px 4px; }

    .editor-area {
      min-height: 400px;
      padding: 16px;
      border: 1px solid #ddd;
      border-top: none;
      border-radius: 0 0 6px 6px;
      background: #fff;
      outline: none;
      font-size: 1rem;
      line-height: 2;
      color: #444;
    }
    .editor-area:focus { border-color: #888; }
    .editor-area img { max-width: 100%; height: auto; border-radius: 4px; margin: 12px 0; }
    .editor-area h2 { font-size: 1.3rem; font-weight: 500; margin: 24px 0 8px; }
    .editor-area h3 { font-size: 1.1rem; font-weight: 500; margin: 20px 0 6px; }
    .editor-area blockquote { border-left: 3px solid #ddd; padding-left: 16px; color: #888; margin: 16px 0; }
    .editor-area p { margin-bottom: 12px; }

    .editor-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary { background: #333; color: #fff; }
    .btn-primary:hover { background: #555; }
    .btn-outline { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-outline:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>我的小站</h1>
      <p class="subtitle">写点东西，留些痕迹</p>
    </div>
  </header>

  <nav>
    <div class="container">
      <a href="index.html">首页</a>
      <a href="articles.html" class="active">文字</a>
      <a href="pdfs.html">PDF 作品</a>
    </div>
  </nav>

  <main class="container">
    <!-- 正常文章列表视图 -->
    <div id="listView">
      <div style="display:flex;align-items:baseline;justify-content:space-between;">
        <h2 class="page-title">✍️ 文字</h2>
        <div class="write-new">
          <a onclick="showPwdDialog()">✎ 写新文章</a>
        </div>
      </div>

      <!-- 动态文章列表 -->
      <ul class="article-list" id="dynamicList"></ul>

      <!-- 静态文章 -->
      <ul class="article-list">
        <li>
          <a href="articles/demo.html">示例文章：开始写点什么</a>
          <div class="article-date">2026-05-19</div>
          <p class="article-excerpt">不管写什么，先开始就好了。这篇文章是一篇占位的示例，你可以随时替换成自己的内容…</p>
        </li>
      </ul>

      <p style="text-align:center;color:#ccc;margin-top:60px;" id="noMoreHint">更多文章即将到来</p>
    </div>

    <!-- 编辑器视图（写新文章） -->
    <div class="editor-wrap" id="editorView">
      <a class="editor-back" onclick="backToList()">← 返回文章列表</a>
      <div class="editor-field">
        <label>标题</label>
        <input type="text" id="editTitle" placeholder="文章标题">
      </div>
      <div class="editor-toolbar">
        <button onclick="execCmd('bold')" title="加粗"><b>B</b></button>
        <button onclick="execCmd('italic')" title="斜体"><i>I</i></button>
        <button onclick="execCmd('underline')" title="下划线"><u>U</u></button>
        <span class="sep"></span>
        <button onclick="execCmd('formatBlock','<h2>')" title="大标题">H2</button>
        <button onclick="execCmd('formatBlock','<h3>')" title="小标题">H3</button>
        <button onclick="execCmd('formatBlock','<p>')" title="正文">P</button>
        <span class="sep"></span>
        <button onclick="execCmd('insertUnorderedList')" title="无序列表">• 列表</button>
        <button onclick="execCmd('insertOrderedList')" title="有序列表">1. 列表</button>
        <button onclick="execCmd('formatBlock','<blockquote>')" title="引用">❝ 引用</button>
        <span class="sep"></span>
        <button onclick="insertImage()" title="插入图片">🖼 图片</button>
      </div>
      <div class="editor-area" id="editorArea" contenteditable="true"></div>
      <input type="file" id="imageFileInput" accept="image/*" style="display:none" onchange="handlePastedImage(event)">
      <div class="editor-actions">
        <button class="btn btn-primary" id="saveBtn" onclick="saveNewArticle()">💾 发布文章</button>
        <button class="btn btn-outline" onclick="backToList()">取消</button>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 我的小站</p>
    </div>
  </footer>

  <!-- 密码弹窗 -->
  <div class="pwd-overlay" id="pwdOverlay">
    <div class="pwd-dialog">
      <h3>🔒 验证身份</h3>
      <p class="sub">输入管理密码以写新文章</p>
      <input type="password" id="pwdInput" placeholder="输入管理密码">
      <div class="err" id="pwdErr"></div>
      <div class="btns">
        <button class="btn-cancel" onclick="closePwdDialog()">取消</button>
        <button class="btn-confirm" onclick="verifyPassword()">确认</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    var DEFAULT_PWD = 'admin123';
    var DB_NAME = 'MySiteDB';
    var DB_VERSION = 2;
    var db = null;

    // ===== 打开数据库（仅一次） =====
    function openDB(cb) {
      var req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = function(e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains('articles')) {
          d.createObjectStore('articles', { keyPath: 'id' });
        }
        if (!d.objectStoreNames.contains('config')) {
          d.createObjectStore('config', { keyPath: 'key' });
        }
      };
      req.onsuccess = function(e) { db = e.target.result; cb(); };
      req.onerror = function(e) { console.error('IndexedDB open failed', e.target.error); };
    }

    function dbPut(storeName, data, cb, errCb) {
      try {
        var tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).put(data);
        tx.oncomplete = function() { if (cb) cb(); };
        tx.onerror = function(e) { if (errCb) errCb(e.target.error); };
      } catch(e) { if (errCb) errCb(e); }
    }

    function dbGet(storeName, key, cb) {
      try {
        var tx = db.transaction(storeName, 'readonly');
        var req = tx.objectStore(storeName).get(key);
        req.onsuccess = function() { cb(req.result); };
        req.onerror = function() { cb(null); };
      } catch(e) { cb(null); }
    }

    function dbGetAll(storeName, cb) {
      try {
        var tx = db.transaction(storeName, 'readonly');
        var req = tx.objectStore(storeName).getAll();
        req.onsuccess = function() { cb(req.result); };
        req.onerror = function() { cb([]); };
      } catch(e) { cb([]); }
    }

    // ===== 密码弹窗 =====
    window.showPwdDialog = function() {
      document.getElementById('pwdOverlay').classList.add('show');
      document.getElementById('pwdInput').value = '';
      document.getElementById('pwdErr').textContent = '';
      setTimeout(function() { document.getElementById('pwdInput').focus(); }, 100);
    };

    window.closePwdDialog = function() {
      document.getElementById('pwdOverlay').classList.remove('show');
    };

    document.getElementById('pwdInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') window.verifyPassword();
    });

    document.getElementById('pwdOverlay').addEventListener('click', function(e) {
      if (e.target === this) window.closePwdDialog();
    });

    window.verifyPassword = function() {
      var input = document.getElementById('pwdInput').value;
      dbGet('config', 'password', function(cfg) {
        var savedPwd = cfg ? cfg.value : DEFAULT_PWD;
        if (input === savedPwd) {
          window.closePwdDialog();
          openEditor();
        } else {
          document.getElementById('pwdErr').textContent = '密码错误，请重试';
        }
      });
    };

    // ===== 编辑器切换 =====
    function openEditor() {
      document.getElementById('listView').style.display = 'none';
      document.getElementById('editorView').classList.add('show');
      document.getElementById('editTitle').value = '';
      document.getElementById('editorArea').innerHTML = '';
      document.getElementById('saveBtn').textContent = '💾 发布文章';
      document.getElementById('editTitle').focus();
    }

    window.backToList = function() {
      document.getElementById('editorView').classList.remove('show');
      document.getElementById('listView').style.display = '';
      loadArticles();
    };

    // ===== 编辑器命令 =====
    window.execCmd = function(cmd, arg) {
      document.execCommand(cmd, false, arg || null);
      document.getElementById('editorArea').focus();
    };

    window.insertImage = function() {
      document.getElementById('imageFileInput').click();
    };

    window.handlePastedImage = function(event) {
      var file = event.target.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) { alert('请选择图片文件'); return; }
      var reader = new FileReader();
      reader.onload = function() {
        var img = document.createElement('img');
        img.src = reader.result;
        document.getElementById('editorArea').focus();
        document.execCommand('insertHTML', false, img.outerHTML);
      };
      reader.readAsDataURL(file);
      event.target.value = '';
    };

    document.addEventListener('paste', function(e) {
      var editorView = document.getElementById('editorView');
      if (!editorView.classList.contains('show')) return;
      var items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.startsWith('image/')) {
          e.preventDefault();
          var blob = items[i].getAsFile();
          var reader = new FileReader();
          reader.onload = function() {
            var img = document.createElement('img');
            img.src = reader.result;
            document.getElementById('editorArea').focus();
            document.execCommand('insertHTML', false, img.outerHTML);
          };
          reader.readAsDataURL(blob);
          break;
        }
      }
    });

    // ===== 保存新文章 =====
    window.saveNewArticle = function() {
      var title = document.getElementById('editTitle').value.trim();
      var content = document.getElementById('editorArea').innerHTML.trim();
      if (!title) { alert('请输入标题'); return; }
      if (!content || content === '<br>') { alert('请输入内容'); return; }

      if (!db) { alert('数据库未就绪，请刷新页面后重试'); return; }

      var article = {
        id: 'a_' + Date.now(),
        title: title,
        content: content,
        createdAt: Date.now(),
        updatedAt: Date.now()
      };

      dbPut('articles', article, function() {
        alert('发布成功！');
        window.backToList();
      }, function(err) {
        alert('保存失败：' + (err && err.message ? err.message : '未知错误'));
      });
    };

    // ===== 文章列表 =====
    function loadArticles() {
      var listEl = document.getElementById('dynamicList');
      var hintEl = document.getElementById('noMoreHint');
      if (!db) { render([]); return; }
      if (!db.objectStoreNames.contains('articles')) { render([]); return; }

      dbGetAll('articles', function(articles) {
        render(articles);
      });

      function render(articles) {
        if (!articles || articles.length === 0) { listEl.innerHTML = ''; return; }
        articles.sort(function(a, b) { return b.updatedAt - a.updatedAt; });
        listEl.innerHTML = articles.map(function(a) {
          var date = new Date(a.updatedAt).toISOString().split('T')[0];
          var text = a.content.replace(/<[^>]*>/g, '').substring(0, 80);
          if (a.content.replace(/<[^>]*>/g, '').length > 80) text += '\u2026';
          return '<li>' +
            '<a href="article.html?id=' + encodeURIComponent(a.id) + '">' + escHtml(a.title) + '</a>' +
            '<div class="article-date">' + date + '</div>' +
            '<p class="article-excerpt">' + escHtml(text) + '</p>' +
            '</li>';
        }).join('');
        if (articles.length > 0) hintEl.textContent = '';
      }
    }

    function escHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== 初始化 =====
    openDB(function() { loadArticles(); });
  })();
  </script>
</body>
</html>
