<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的小站</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>我的小站</h1>
      <p class="subtitle">写点东西，留些痕迹</p>
    </div>
  </header>

  <nav>
    <div class="container">
      <a href="index.html" class="active">首页</a>
      <a href="articles.html">文字</a>
      <a href="pdfs.html">PDF 作品</a>
    </div>
  </nav>

  <main class="container">
    <section class="hero">
      <img src="二十四花生.jpg" alt="头像" class="avatar">
      <h2>二十四花生</h2>
      <p>这里是我存放文字和作品的地方。不花哨，简简单单。</p>
    </section>

    <section class="preview">
      <h3>最近更新</h3>
      <div id="recentArticles"></div>
      <div class="card-list">
        <a href="articles.html" class="card">
          <h4>✍️ 文字</h4>
          <p>随笔、笔记、想法</p>
        </a>
        <a href="pdfs.html" class="card">
          <h4>📄 PDF 作品</h4>
          <p>排版好的文档、作品集</p>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 我的小站 &nbsp;·&nbsp; <a href="admin.html" style="color:#ddd;text-decoration:none;">管理</a></p>
    </div>
  </footer>

  <script>
  (function() {
    var container = document.getElementById('recentArticles');
    var req = indexedDB.open('MySiteDB', 1);
    req.onsuccess = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('articles')) return;
      var tx = db.transaction('articles', 'readonly');
      var getAll = tx.objectStore('articles').getAll();
      getAll.onsuccess = function() {
        var articles = getAll.result;
        if (!articles || articles.length === 0) return;
        articles.sort(function(a, b) { return b.updatedAt - a.updatedAt; });
        var recent = articles.slice(0, 3);
        var html = '<ul class="article-list" style="margin-bottom:24px">';
        recent.forEach(function(a) {
          var date = new Date(a.updatedAt).toISOString().split('T')[0];
          var text = a.content.replace(/<[^>]*>/g, '').substring(0, 60);
          if (a.content.replace(/<[^>]*>/g, '').length > 60) text += '…';
          html += '<li>' +
            '<a href="article.html?id=' + encodeURIComponent(a.id) + '">' + escHtml(a.title) + '</a>' +
            '<div class="article-date">' + date + '</div>' +
            '<p class="article-excerpt">' + escHtml(text) + '</p>' +
            '</li>';
        });
        html += '</ul>';
        container.innerHTML = html;
      };
    };

    function escHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  })();
  </script>
</body>
</html>
